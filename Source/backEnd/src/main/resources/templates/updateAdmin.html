<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Admin</title>
</head>

<body>
    <h1>Update Admin</h1>
    <form action="/ssps/admin/updateAdmin/${admin.adminID}" method="post">
        <label for="adminName">Name:</label>
        <input type="text" id="adminName" name="adminName" th:field="*{adminName}" required><br><br>

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" th:field="*{username}" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" th:field="*{password}" required><br><br>

        <label for="adminEmail">Email:</label>
        <input type="email" id="adminEmail" name="adminEmail" th:field="*{adminEmail}" required><br><br>

        <label for="adminAddress">Address:</label>
        <input type="text" id="adminAddress" name="adminAddress" th:field="*{adminAddress}" required><br><br>

        <label for="avatar">Avatar:</label>
        <input type="text" id="avatar" name="avatar" th:field="*{avatar}"><br><br>

        <label for="pageNumber">Page Number:</label>
        <input type="number" id="pageNumber" name="pageNumber" th:field="*{pageNumber}" required min="0"><br><br>

        <button type="submit">Update Admin</button>
    </form>
    <a href="/ssps/admin/accountList">Back to List</a>
</body>

</html>
