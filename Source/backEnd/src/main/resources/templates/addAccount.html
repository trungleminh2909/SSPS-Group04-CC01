<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin and Student List</title>
</head>

<body>
    <h1>Add New Account</h1>
    <form id="accountForm">
        <label for="accountType">Account Type:</label>
        <select id="accountType" name="accountType">
            <option value="admin">Admin</option>
            <option value="student">Student</option>
        </select><br><br>

        <!-- Common Fields -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="id">ID:</label>
        <input type="text" id="id" name="id" required><br><br>

        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="address">Address:</label>
        <input type="text" id="address" name="address" required><br><br>

        <label for="avatar">Avatar:</label>
        <input type="text" id="avatar" name="avatar" required><br><br>

        <div id="pageNumberField">
            <label for="pageNumber">Page Number:</label>
            <input type="number" id="pageNumber" name="pageNumber" required><br><br>
        </div>

        <button type="submit">Add Account</button>
    </form>

    <script>
        document.getElementById('accountForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const accountType = document.getElementById('accountType').value;
            const name = document.getElementById('name').value;
            const id = document.getElementById('id').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const address = document.getElementById('address').value;
            const avatar = document.getElementById('avatar').value;
            const pageNumber = document.getElementById('pageNumber').value;

            const data = accountType === 'admin' ? {
                adminName: name,
                adminID: id,
                username: username,
                password: password,
                adminEmail: email,
                adminAddress: address,
                avatar: avatar,
                pageNumber: pageNumber
            } : {
                studentName: name,
                studentID: id,
                username: username,
                password: password,
                studentEmail: email,
                studentAddress: address,
                avatar: avatar,
                pageNumber: pageNumber
            };

            const url = accountType === 'admin' ? '/ssps/admin/addAdmin' : '/ssps/admin/addStudent';
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams(data).toString()
            });

            if (response.ok) {
                window.location.href = `/ssps/admin/accountList`;
            } else {
                console.error('Failed to add account');
            }
        });

    </script>
</body>

</html>
